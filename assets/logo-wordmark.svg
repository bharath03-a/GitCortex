<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none" aria-label="GitCortex">
  <rect width="360" height="100" rx="18" fill="#faf9f5"/>
  <!-- icon + text centered as a group (icon ~52px + 12px gap + text ~196px = 260px → offset 50) -->
  <g transform="translate(50, 0)">
    <!-- icon (0,0 relative, spans ~52px wide) -->
    <line x1="10" y1="24" x2="42" y2="44" stroke="#cc785c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="24" x2="26" y2="72" stroke="#cc785c" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="42" y1="44" x2="26" y2="72" stroke="#cc785c" stroke-width="3" stroke-linecap="round" opacity="0.65"/>
    <circle cx="10" cy="24" r="9" fill="#cc785c"/>
    <circle cx="42" cy="44" r="7" fill="#e0a07f"/>
    <circle cx="26" cy="72" r="7" fill="#e0a07f"/>
    <!-- text starts at x=64 (52px icon + 12px gap) -->
    <text x="64" y="66"
          font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
          font-size="38" font-weight="700" fill="#1a1a1a" letter-spacing="-1">GitCortex</text>
  </g>
</svg>

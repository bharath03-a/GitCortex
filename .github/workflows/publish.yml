name: Publish to crates.io

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish gitcortex-core
        run: cargo publish -p gitcortex-core --no-verify

      - name: Wait for crates.io to index gitcortex-core
        run: sleep 30

      - name: Publish gitcortex-indexer
        run: cargo publish -p gitcortex-indexer --no-verify

      - name: Wait for crates.io to index gitcortex-indexer
        run: sleep 30

      - name: Publish gitcortex-store
        run: cargo publish -p gitcortex-store --no-verify

      - name: Wait for crates.io to index gitcortex-store
        run: sleep 30

      - name: Publish gitcortex
        run: cargo publish -p gitcortex --no-verify

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.0)"
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform_tag: linux_x86_64
            archive_suffix: x86_64-unknown-linux-gnu.tar.xz
            binary_name: gcx
          - target: aarch64-unknown-linux-gnu
            platform_tag: linux_aarch64
            archive_suffix: aarch64-unknown-linux-gnu.tar.xz
            binary_name: gcx
          - target: x86_64-apple-darwin
            platform_tag: macosx_10_12_x86_64
            archive_suffix: x86_64-apple-darwin.tar.xz
            binary_name: gcx
          - target: aarch64-apple-darwin
            platform_tag: macosx_11_0_arm64
            archive_suffix: aarch64-apple-darwin.tar.xz
            binary_name: gcx
          # Windows excluded — KuzuDB 0.11.3 (archived) does not link on MSVC.

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatchling build wheel

      - name: Download binary from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          ARCHIVE="gitcortex-${{ matrix.archive_suffix }}"
          gh release download "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --pattern "$ARCHIVE" \
            --output "$ARCHIVE"
          if [[ "$ARCHIVE" == *.zip ]]; then
            unzip -q "$ARCHIVE"
          else
            tar -xJf "$ARCHIVE"
          fi
          cp "gitcortex-${{ matrix.target }}/${{ matrix.binary_name }}" \
            "python/src/gitcortex/_bin/${{ matrix.binary_name }}"
          chmod +x "python/src/gitcortex/_bin/${{ matrix.binary_name }}"

      - name: Update version in __init__.py
        run: |
          VERSION="${{ env.RELEASE_TAG }}"
          VERSION="${VERSION#v}"
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" \
            python/src/gitcortex/__init__.py

      - name: Build wheel
        working-directory: python
        run: python -m build --wheel --no-isolation

      - name: Retag wheel with correct platform
        working-directory: python
        run: |
          # Rename the generic wheel to the correct platform tag
          WHEEL=$(ls dist/*.whl)
          # Strip the 'none-any' tag and replace with platform-specific tag
          NEW_WHEEL=$(echo "$WHEEL" | sed 's/py3-none-any/py3-none-${{ matrix.platform_tag }}/')
          mv "$WHEEL" "$NEW_WHEEL"
          echo "Wheel: $NEW_WHEEL"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_tag }}
          path: python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true

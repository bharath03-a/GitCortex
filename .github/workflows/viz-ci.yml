name: Viz CI

# Runs only when the viz frontend changes. Fast, doesn't need Rust.

on:
  push:
    branches: [main]
    paths:
      - "viz/**"
      - ".github/workflows/viz-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "viz/**"
      - ".github/workflows/viz-ci.yml"

concurrency:
  group: viz-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: viz

jobs:
  viz:
    name: viz · lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - run: npm ci

      - name: Prettier --check
        run: npm run format:check

      - name: ESLint + tsc --noEmit
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Production build
        run: npm run build

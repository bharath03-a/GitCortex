name: Viz CI

# Runs only when the viz frontend changes. Fast, doesn't need Rust.

on:
  push:
    branches: [main]
    paths:
      - "viz/**"
      - ".github/workflows/viz-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "viz/**"
      - ".github/workflows/viz-ci.yml"

concurrency:
  group: viz-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: viz

jobs:
  viz:
    name: viz · lint + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      # `npm install` (not `npm ci`): lightningcss ships per-platform native
      # binaries as optionalDependencies; `npm ci` from a lockfile generated on
      # another OS skips the runner's variant (npm/cli#4828). `npm install`
      # resolves the correct binary for this platform.
      - run: npm install --no-audit --no-fund

      - name: Prettier --check
        run: npm run format:check

      - name: ESLint + tsc --noEmit
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Production build
        run: npm run build

      # Guard against accidental JS bloat. 2 MB is generous for a viz tool;
      # lower this incrementally once we establish a real baseline.
      - name: Bundle size check (2 MB ceiling)
        run: |
          DIST_SIZE=$(du -sb dist/ | cut -f1)
          echo "dist/ size: ${DIST_SIZE} bytes"
          python3 -c "import sys; sys.exit(0 if int('${DIST_SIZE}') < 2*1024*1024 else 1)" \
            || (echo "Bundle exceeds 2 MB ceiling: ${DIST_SIZE} bytes" && exit 1)

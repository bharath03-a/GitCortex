name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Faster sccache-less builds on hosted runners
  CARGO_INCREMENTAL: 0
  # cargo-nextest works better with this
  RUSTFLAGS: "-Dwarnings"

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap, fast feedback that runs first
  rust-fmt-clippy:
    name: rust · fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable"

      # Need the viz bundle to exist for `gitcortex-mcp` to compile (build.rs)
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend (so include_bytes! works)
        working-directory: viz
        run: |
          npm ci
          npm run build

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Multi-platform build + test matrix
  rust-build-test:
    name: rust · ${{ matrix.os }} · ${{ matrix.toolchain }}
    needs: [rust-fmt-clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          # Also test on the pinned MSRV — only on Linux to keep CI minutes down
          - os: ubuntu-latest
            toolchain: "1.95"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}-${{ matrix.toolchain }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend
        working-directory: viz
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Test (cargo-nextest)
        run: cargo nextest run --workspace
        env:
          # nextest doesn't pick this up from RUSTFLAGS
          NEXTEST_PROFILE: ci

      - name: Doctests (nextest doesn't run them)
        run: cargo test --workspace --doc

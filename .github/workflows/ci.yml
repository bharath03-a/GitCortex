name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 0: fast static checks (no Rust/Node build) ─────────────────────────

  typos:
    name: typos · spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  shellcheck:
    name: shellcheck · hook scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck hooks/post-commit hooks/post-merge hooks/post-rewrite hooks/post-checkout

  # ── Tier 1: build viz once, upload as artifact, reuse everywhere ─────────────

  viz-bundle:
    name: viz · build bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json
      - name: Build viz frontend
        working-directory: viz
        run: |
          npm install --no-audit --no-fund
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: viz-dist
          path: viz/dist/
          retention-days: 1

  # ── Tier 2: Rust lint (uses viz artifact) ────────────────────────────────────

  rust-fmt-clippy:
    name: rust · fmt + clippy
    runs-on: ubuntu-latest
    needs: [viz-bundle]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable"
      - uses: actions/download-artifact@v4
        with:
          name: viz-dist
          path: viz/dist/
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-doc:
    name: rust · doc
    runs-on: ubuntu-latest
    needs: [viz-bundle]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-doc"
      - uses: actions/download-artifact@v4
        with:
          name: viz-dist
          path: viz/dist/
      - name: cargo doc
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  cargo-machete:
    name: rust · unused deps (machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-machete"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  # ── Tier 3: build + test ──────────────────────────────────────────────────────
  # PRs: Linux stable + MSRV only (fast feedback).
  # Push to main: adds macOS (linker/platform check).

  rust-build-test:
    name: rust · ${{ matrix.os }} · ${{ matrix.toolchain }}
    needs: [rust-fmt-clippy]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
          - os: ubuntu-latest
            toolchain: "1.95"
          - os: macos-latest
            toolchain: stable
            pr_skip: true   # skip on PRs — macOS runner is 10× slower
    runs-on: ${{ matrix.os }}
    if: ${{ matrix.pr_skip != true || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}-${{ matrix.toolchain }}"
      - uses: actions/download-artifact@v4
        with:
          name: viz-dist
          path: viz/dist/
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - run: cargo build --workspace --all-targets
      - run: cargo nextest run --workspace
        env:
          NEXTEST_PROFILE: ci
      - run: cargo test --workspace --doc

  # ── Tier 4: coverage ─────────────────────────────────────────────────────────

  coverage:
    name: rust · coverage
    runs-on: ubuntu-latest
    needs: [rust-fmt-clippy]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-cov"
      - uses: actions/download-artifact@v4
        with:
          name: viz-dist
          path: viz/dist/
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest
      - name: Run tests with coverage
        run: |
          cargo llvm-cov nextest --workspace \
            --ignore-filename-regex '(tools\.rs|gitcortex-viz/src/lib\.rs)' \
            --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Coverage threshold (60%)
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex '(tools\.rs|gitcortex-viz/src/lib\.rs)' \
            --fail-under-lines 60

  # ── Tier 5: binary smoke test ────────────────────────────────────────────────

  binary-smoke:
    name: rust · binary smoke test
    runs-on: ubuntu-latest
    needs: [rust-build-test]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Same key as ubuntu-stable build-test — hits warm cache
          shared-key: "ubuntu-stable"
      - uses: actions/download-artifact@v4
        with:
          name: viz-dist
          path: viz/dist/
      - run: cargo build --release --bin gcx
      - run: ./target/release/gcx --version
      - run: ./target/release/gcx --help
      - name: gcx doctor (outside git repo)
        run: |
          mkdir /tmp/not-a-repo
          cd /tmp/not-a-repo
          $GITHUB_WORKSPACE/target/release/gcx doctor || true

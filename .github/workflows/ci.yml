name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Faster sccache-less builds on hosted runners
  CARGO_INCREMENTAL: 0
  # cargo-nextest works better with this
  RUSTFLAGS: "-Dwarnings"

# Cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: fast static checks (run in parallel, no Rust build needed) ─────

  typos:
    name: typos · spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1

  shellcheck:
    name: shellcheck · hook scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck
        run: shellcheck hooks/post-commit hooks/post-merge hooks/post-rewrite hooks/post-checkout

  # ── Tier 2: Rust lint (needs toolchain, no KuzuDB compile) ──────────────────

  rust-fmt-clippy:
    name: rust · fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable"

      # Need the viz bundle to exist for `gitcortex-mcp` to compile (build.rs)
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend (so include_bytes! works)
        working-directory: viz
        run: |
          npm install --no-audit --no-fund
          npm run build

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-doc:
    name: rust · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-doc"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend
        working-directory: viz
        run: |
          npm install --no-audit --no-fund
          npm run build

      # -D warnings: broken doc links / malformed examples = CI failure.
      # RUSTDOCFLAGS env var is the idiomatic way to pass flags to rustdoc.
      - name: cargo doc
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

  cargo-machete:
    name: rust · unused deps (machete)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-machete"
      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  # ── Tier 3: build + test matrix (needs full compile) ────────────────────────

  rust-build-test:
    name: rust · ${{ matrix.os }} · ${{ matrix.toolchain }}
    needs: [rust-fmt-clippy]
    strategy:
      fail-fast: false
      matrix:
        # Windows is excluded — see dist-workspace.toml. KuzuDB 0.11.3 does not
        # link cleanly on MSVC and the upstream project is archived.
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable]
        include:
          # Also test on the pinned MSRV — only on Linux to keep CI minutes down
          - os: ubuntu-latest
            toolchain: "1.95"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.os }}-${{ matrix.toolchain }}"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend
        working-directory: viz
        shell: bash
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Test (cargo-nextest)
        run: cargo nextest run --workspace
        env:
          # nextest doesn't pick this up from RUSTFLAGS
          NEXTEST_PROFILE: ci

      - name: Doctests (nextest doesn't run them)
        run: cargo test --workspace --doc

  # ── Tier 4: coverage (Linux only, release profile not needed) ───────────────

  coverage:
    name: rust · coverage
    runs-on: ubuntu-latest
    needs: [rust-fmt-clippy]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-cov"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend
        working-directory: viz
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Install cargo-llvm-cov and nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: Run tests with coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # Hard floor: fail if line coverage drops below 60%.
      # Raise this incrementally as test suite grows toward the 80% target.
      # Uses cargo-llvm-cov's own --fail-under-lines flag to avoid re-running tests.
      - name: Coverage threshold (60%)
        run: cargo llvm-cov report --fail-under-lines 60

  # ── Tier 5: binary smoke test (release build sanity) ────────────────────────

  binary-smoke:
    name: rust · binary smoke test
    runs-on: ubuntu-latest
    needs: [rust-build-test]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ubuntu-stable-smoke"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viz/package-lock.json

      - name: Build viz frontend
        working-directory: viz
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Build release binary
        run: cargo build --release --bin gcx

      - name: gcx --version
        run: ./target/release/gcx --version

      - name: gcx --help (exits 0)
        run: ./target/release/gcx --help

      - name: gcx doctor (outside git repo — must not panic)
        run: |
          mkdir /tmp/not-a-repo
          cd /tmp/not-a-repo
          $GITHUB_WORKSPACE/target/release/gcx doctor || true

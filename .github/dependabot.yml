version: 2
# Strategy
# --------
# Bundle every patch + minor bump per ecosystem into a single weekly PR via
# a catch-all `all-deps` group. Major bumps still come as one PR per
# dependency so they can be vetted individually (React, vite, etc. tend to
# carry breaking changes).
#
# Net effect: ~3 PRs/week in steady state instead of ~10+.
updates:
  # Cargo workspace
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-deps:
        patterns: ["*"]
        update-types: ["patch", "minor"]

  # Frontend (viz)
  - package-ecosystem: npm
    directory: "/viz"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Phoenix"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-deps:
        patterns: ["*"]
        update-types: ["patch", "minor"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
    groups:
      all-actions:
        patterns: ["*"]

# cargo-deny — https://embarkstudios.github.io/cargo-deny/
# Install: `cargo install cargo-deny --locked`
# Run:     `cargo deny check`

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Unmaintained (not vulnerable) transitive deps pulled in by the semantic-search
# stack (fastembed → ort / hf-hub). No upgrade path; not exploitable.
ignore = [
    "RUSTSEC-2024-0436", # paste — unmaintained (via ort/ML deps)
    "RUSTSEC-2025-0119", # number_prefix — unmaintained (via hf-hub)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    # Permissive licenses pulled in by the semantic-search deps (fastembed/ort/
    # hf-hub/tokenizers). NCSA = University of Illinois/NCSA (BSD-like);
    # CDLA-Permissive-2.0 = Community Data License Agreement (permissive).
    "NCSA",
    "CDLA-Permissive-2.0",
]
exceptions = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
